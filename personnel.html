<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夜班审计 — 人事档案</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/personnel.css">
</head>
<body>
  <div id="top-bar"></div>
  <div class="main-content">
    <div class="chapter-banner fade-in">
      <div class="chapter-number">第十三章</div>
      <div class="chapter-title">谁是幕后</div>
      <div class="chapter-subtitle">通讯记录揭露了一个精心策划的阴谋——现在需要确认操控者的真实身份</div>
    </div>
    <div class="alert alert-warning fade-in">
      <span class="alert-icon">👤</span>
      <div>你已获得人事系统只读权限。调查相关人员的档案和系统访问记录，找出谁在操控 <code>svc-admin-0312</code>。</div>
    </div>

    <!-- 跨章节线索提示 -->
    <div class="card fade-in" id="crossref-panel" style="display:none;margin-bottom:16px;border-left:3px solid var(--accent-gold);">
      <div style="font-size:12px;color:var(--accent-gold);font-weight:600;margin-bottom:8px;">🔗 来自其他调查的关键线索</div>
      <div id="crossref-items" style="font-size:12px;line-height:1.8;color:var(--text-secondary);"></div>
      <div style="font-size:11px;color:var(--text-secondary);margin-top:8px;font-style:italic;">💡 结合这些线索，查看人员档案中的异常记录，找出 svc-admin-0312 的操控者</div>
    </div>
    <div class="personnel-layout">
      <div class="personnel-sidebar">
        <div class="card fade-in">
          <div class="card-title" style="margin-bottom:12px;">📂 相关人员</div>
          <div class="person-list" id="person-list"></div>
        </div>
      </div>
      <div class="personnel-main">
        <div class="card profile-viewer fade-in" id="profile-viewer">
          <div style="text-align:center;padding:60px 20px;color:var(--text-secondary);">
            ← 选择一名人员查看档案
          </div>
        </div>
      </div>
    </div>
    <div id="suspect-section" style="display:none;margin-top:24px;">
      <div class="suspect-confirm">
        <div class="suspect-confirm-title">🔍 指认嫌疑人</div>
        <div class="suspect-confirm-text">根据你的调查，谁是这起事件的幕后主导者？<br>输入该人员的工号来确认。</div>
        <div class="suspect-input-row">
          <input type="text" class="input-field input-mono" id="suspect-input" placeholder="输入工号 (如 EMP-XXXX)">
          <button class="btn-danger" onclick="confirmSuspect()">确认指认</button>
        </div>
        <div class="form-hint" id="suspect-hint" style="margin-top:8px;">提示：仔细查看每个人的访问记录和通讯线索</div>
      </div>
    </div>
    <div id="next-chapter" style="display:none;text-align:center;margin-top:24px;">
      <div class="alert alert-success" style="max-width:600px;margin:0 auto 16px;">
        <span class="alert-icon">✅</span>
        <div>嫌疑人已确认。你需要进入服务器终端获取最终的物理证据。</div>
      </div>
      <button class="btn-primary proceed-btn-pulse" style="font-size:15px;padding:12px 28px;" onclick="proceedToTerminal()">
        💻 进入服务器终端 →
      </button>
    </div>
  </div>
  <div id="bottom-bar"></div>
  <script src="js/game-state.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/interactions.js"></script>
  <script>
    const personnel = [
      {
        id: 'EMP-3127', name: '梁志远', role: '运营副总裁', dept: '运营管理部',
        avatar: '👔', joinDate: '2019-03-15', level: 'VP',
        bio: '负责 Helpline Zero 全部运营管理。直接向 CEO 汇报。2023年起兼管供应链质量合规。',
        accessLog: [
          { time: '02-14 18:30', action: '登录 Admin Console', anomaly: false },
          { time: '02-14 21:15', action: '访问 svc-admin-0312 权限配置', anomaly: true },
          { time: '02-14 22:38', action: '修改 KB-4412 v2.3 知识库条目', anomaly: true },
          { time: '02-14 22:41', action: '通过 svc-admin-0312 发送内部通讯', anomaly: true },
          { time: '02-15 01:28', action: '使用 admin-api 补写审计日志', anomaly: true },
          { time: '02-15 03:05', action: '远程访问服务器 srv-hz-prod-01', anomaly: true }
        ],
        connections: ['林昊 (供应链)', 'svc-admin-0312', 'KB-4412 修改者'],
        note: '在事故发生前 4 小时，梁志远通过 admin 权限访问了服务账号配置。他的访问记录与通讯解密中 "L" 的署名高度吻合。',
        suspicious: true
      },
      {
        id: 'EMP-4201', name: '林昊', role: '供应链经理', dept: '供应链管理部',
        avatar: '📦', joinDate: '2020-07-22', level: 'M2',
        bio: '负责硬件供应商质量管理和产品召回流程。AX13 批次门锁的供应商由他直接对接。',
        accessLog: [
          { time: '02-14 14:00', action: '查看 AX13 质检报告', anomaly: false },
          { time: '02-14 17:45', action: '编辑 AX13 召回评估文档 — 状态改为"低风险"', anomaly: true },
          { time: '02-14 23:15', action: '发送加密内部通讯', anomaly: true },
          { time: '02-15 01:00', action: '删除 AX13 原始质检报告附件', anomaly: true }
        ],
        connections: ['梁志远 (指示链)', 'AX13 召回报告', '许知微投诉工单'],
        note: '林昊参与了 AX13 召回报告的篡改。根据通讯记录，他受梁志远指示压制门锁漏洞信息。',
        suspicious: true
      },
      {
        id: 'EMP-5582', name: '赵锐', role: '值班主管', dept: '运维中心',
        avatar: '🛡️', joinDate: '2021-01-10', level: 'M1',
        bio: '运维中心夜班负责人。发现 HZ-7 异常后第一时间向你报告。',
        accessLog: [
          { time: '02-15 01:15', action: '发现 HZ-7 异常关闭工单', anomaly: false },
          { time: '02-15 01:30', action: '发送 3 次停止指令 (均被覆盖)', anomaly: false },
          { time: '02-15 02:45', action: '联系审计组 — 呼叫当值审计员', anomaly: false }
        ],
        connections: ['当值审计员 (报告链)', 'HZ-7 停止指令'],
        note: '赵锐是事故的发现者和报告者。访问记录清白，没有参与异常操作的痕迹。',
        suspicious: false
      },
      {
        id: 'EMP-6610', name: '周薇', role: '客服工程师', dept: '技术支持部',
        avatar: '🔧', joinDate: '2022-04-18', level: 'IC3',
        bio: '负责 HZ-7 代理的日常维护和知识库更新。发现 KB-4412 被异常修改后向主管报告。',
        accessLog: [
          { time: '02-14 09:00', action: '常规知识库审核', anomaly: false },
          { time: '02-14 16:30', action: '发现 KB-4412 v2.3 异常修改 — 向主管报告', anomaly: false },
          { time: '02-14 17:00', action: '被告知"已处理"— 报告被忽略', anomaly: true }
        ],
        connections: ['KB-4412 发现者', '技术支持部'],
        note: '周薇曾在事发前发现知识库的异常修改并报告，但被上级以"已处理"为由压下。她本人与事件无直接关联。',
        suspicious: false
      }
    ];

    let viewedPersons = new Set();
    let suspectConfirmed = false;

    function renderPersonList() {
      const list = document.getElementById('person-list');
      list.innerHTML = personnel.map((p, i) => `
        <div class="person-item ${p.suspicious ? 'suspicious' : ''}" data-index="${i}" onclick="viewPerson(${i})">
          <div class="person-avatar">${p.avatar}</div>
          <div class="person-info">
            <div class="person-name">${p.name}</div>
            <div class="person-role">${p.role}</div>
          </div>
          ${viewedPersons.has(i) ? '<span class="tag tag-blue" style="font-size:10px;">已查</span>' : ''}
        </div>
      `).join('');
    }

    function viewPerson(index) {
      const p = personnel[index];
      viewedPersons.add(index);
      NightAudit.addDiscoveredPerson(p.name);
      renderPersonList();

      document.querySelectorAll('.person-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`.person-item[data-index="${index}"]`).classList.add('active');

      const viewer = document.getElementById('profile-viewer');
      viewer.innerHTML = `
        <div class="profile-header">
          <div class="profile-avatar-lg">${p.avatar}</div>
          <div>
            <div class="profile-name">${p.name}</div>
            <div class="profile-title">${p.role} · ${p.dept}</div>
            <div class="profile-id">${p.id} · 入职 ${p.joinDate} · 级别 ${p.level}</div>
          </div>
        </div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;line-height:1.7;">${p.bio}</div>
        <div class="profile-grid">
          <div class="profile-field">
            <div class="profile-field-label">工号</div>
            <div class="profile-field-value">${p.id}</div>
          </div>
          <div class="profile-field">
            <div class="profile-field-label">部门</div>
            <div class="profile-field-value">${p.dept}</div>
          </div>
          <div class="profile-field">
            <div class="profile-field-label">级别</div>
            <div class="profile-field-value">${p.level}</div>
          </div>
          <div class="profile-field">
            <div class="profile-field-label">异常访问</div>
            <div class="profile-field-value ${p.accessLog.filter(a => a.anomaly).length > 0 ? 'suspicious-value' : ''}">${p.accessLog.filter(a => a.anomaly).length} 条</div>
          </div>
        </div>
        <div class="access-log">
          <div class="access-log-title">📋 系统访问记录</div>
          ${p.accessLog.map(a => `
            <div class="access-entry ${a.anomaly ? 'access-anomaly' : ''}">
              <span class="access-time">${a.time}</span>
              <span class="access-action">${a.action}</span>
              ${a.anomaly ? '<span class="tag tag-red">异常</span>' : ''}
            </div>
          `).join('')}
        </div>
        <div class="connection-map">
          <div class="connection-title">🔗 关联分析</div>
          ${p.connections.map(c => `
            <div class="connection-line">
              <span class="connection-arrow">→</span>
              <span>${c}</span>
            </div>
          `).join('')}
        </div>
        <div class="investigation-note">
          <div class="note-header">📝 调查笔记</div>
          <div class="note-body">${p.note}</div>
        </div>
      `;

      if (p.suspicious) {
        NightAudit.addClue(`PERSON-${p.id}`, { name: `${p.name} 档案`, value: `${p.role} — ${p.accessLog.filter(a=>a.anomaly).length}条异常记录`, source: 'P8-人事档案' });
        Interactions.notify(`📂 已记录 ${p.name} 的档案信息`, 'clue', 3000);
      }

      if (viewedPersons.size >= 3 && !suspectConfirmed) {
        document.getElementById('suspect-section').style.display = 'block';
        setTimeout(() => document.getElementById('suspect-section').scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
      }
    }

    function confirmSuspect() {
      const input = document.getElementById('suspect-input').value.trim().toUpperCase();
      const hint = document.getElementById('suspect-hint');
      if (input === 'EMP-3127' || input === 'EMP3127') {
        suspectConfirmed = true;
        NightAudit.set('suspectIdentified', true);
        NightAudit.addClue('SUSPECT', { name: '幕后主导者确认', value: '梁志远 (EMP-3127) — 运营副总裁', source: 'P8-人事档案指认' });
        hint.textContent = '✅ 嫌疑人确认：梁志远 — 运营副总裁';
        hint.style.color = 'var(--accent-green)';
        Interactions.notify('🎯 嫌疑人已锁定：梁志远', 'success', 4000);
        document.getElementById('next-chapter').style.display = 'block';
        setTimeout(() => document.getElementById('next-chapter').scrollIntoView({ behavior: 'smooth' }), 500);
      } else if (input === '') {
        hint.textContent = '请输入工号';
        hint.style.color = 'var(--accent-orange)';
      } else {
        const matchPerson = personnel.find(p => p.id === input);
        if (matchPerson && !matchPerson.suspicious) {
          hint.textContent = `${matchPerson.name} 的访问记录没有异常。再仔细看看谁的记录最可疑。`;
        } else {
          hint.textContent = '工号不匹配。检查人员列表中的工号格式。';
        }
        hint.style.color = 'var(--accent-red)';
        Interactions.notify('指认错误', 'error');
      }
    }

    function proceedToTerminal() {
      Interactions.notify('正在连接服务器终端...', 'info');
      setTimeout(() => Navigation.goTo(14), 800);
    }

    document.getElementById('suspect-input').addEventListener('keydown', e => { if (e.key === 'Enter') confirmSuspect(); });
    renderPersonList();
    if (NightAudit.get('suspectIdentified')) {
      suspectConfirmed = true;
      document.getElementById('next-chapter').style.display = 'block';
    }
  </script>
</body>
</html>
