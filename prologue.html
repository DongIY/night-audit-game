<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夜班审计 — 序章</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/prologue.css">
  <style>
    .skip-prologue {
      position: fixed; top: 12px; right: 16px; z-index: 100;
      padding: 6px 16px; font-size: 12px;
      background: rgba(17,24,32,0.8); color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .skip-prologue:hover { color: var(--text-primary); border-color: var(--accent-blue); }
  </style>
</head>
<body>
  <!-- 跳过序章按钮 -->
  <button class="skip-prologue" onclick="skipPrologue()">⏭ 跳过序章</button>

  <!-- 场景 1: 深夜氛围 -->
  <div class="scene active" id="scene-1">
    <div class="prologue-container">
      <div class="scene-dark">
        <div class="time-display">02:47</div>
        <div class="date-display">2026年2月15日 星期日</div>
        <div class="ambient-text" id="ambient-text"></div>
      </div>
    </div>
  </div>

  <!-- 场景 2: 来电 -->
  <div class="scene" id="scene-2">
    <div class="prologue-container">
      <div class="phone-ringing">
        <div class="phone-icon">📱</div>
        <div class="phone-caller">Helpline Zero — 运维中心</div>
        <div class="phone-number">+86 400-XXXX-0441</div>
        <button class="answer-btn" onclick="answerCall()">
          📞 接听
        </button>
      </div>
    </div>
  </div>

  <!-- 场景 3: 通话内容 -->
  <div class="scene" id="scene-3">
    <div class="prologue-container">
      <div class="call-content">
        <div class="call-header">
          <div class="call-indicator"></div>
          <div class="call-info">
            <div class="call-name">运维中心 — 值班主管 陈嘉铭</div>
            <div class="call-duration" id="call-timer">00:00</div>
          </div>
        </div>
        <div class="call-transcript" id="call-transcript">
          <!-- 动态填充 -->
        </div>
        <div style="text-align:center;margin-top:20px;">
          <button class="btn-primary" id="accept-mission" style="display:none;font-size:15px;padding:12px 28px;" onclick="acceptMission()">
            🔐 接受任务 — 登录系统
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 场景 4: 系统启动 -->
  <div class="scene" id="scene-4">
    <div class="prologue-container">
      <div class="system-boot">
        <div class="boot-terminal" id="boot-terminal">
          <!-- 动态填充 -->
        </div>
        <button class="proceed-to-login" id="proceed-btn" onclick="proceedToLogin()" style="display:none;">
          🔓 进入登录终端
        </button>
      </div>
    </div>
  </div>

  <script src="js/game-state.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/audio.js"></script>
  <script>
    // 如果已完成序章，直接跳转
    NightAudit.load();
    if (NightAudit.get('prologueDone')) {
      const lastPage = NightAudit.get('currentPage');
      if (lastPage > 0) {
        window.location.href = lastPage <= 1 ? 'index.html' : 
          {2:'dashboard.html',3:'ticket.html',4:'audit-log.html',5:'kb-diff.html',
           6:'permission.html',7:'comms.html',8:'personnel.html',9:'terminal.html',
           10:'choices.html',11:'finale.html'}[lastPage] || 'index.html';
      }
    }

    // 跳过序章功能
    function skipPrologue() {
      NightAudit.set('prologueDone', true);
      NightAudit.visitPage(0);
      window.location.href = 'index.html';
    }

    let currentScene = 1;

    function switchScene(num) {
      document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
      const target = document.getElementById('scene-' + num);
      if (target) {
        target.classList.add('active');
        currentScene = num;
      }
    }

    // === 场景 1: 氛围文字 ===
    const ambientLines = [
      '你住在公司旁边的公寓里。',
      '加湿器发出低沉的嗡嗡声，桌上的水杯已经凉了。',
      '今晚轮到你值夜班——合规审计组的夜班。',
      '大部分时间，这份工作和看监控差不多：',
      '盯着系统日志，确认 AI 客服代理没有做出格的事。',
      '',
      '然后手机响了。'
    ];

    async function playAmbient() {
      const el = document.getElementById('ambient-text');
      for (let i = 0; i < ambientLines.length; i++) {
        if (ambientLines[i] === '') {
          await sleep(800);
          continue;
        }
        await typewriterLine(el, ambientLines[i]);
        el.innerHTML += '<br>';
        await sleep(400);
      }
      // 切换到来电场景
      await sleep(1200);
      switchScene(2);
      // 播放手机铃声
      if (typeof AudioEngine !== 'undefined') AudioEngine.playRingtone(3);
    }

    function typewriterLine(el, text) {
      return new Promise(resolve => {
        let i = 0;
        const span = document.createElement('span');
        el.appendChild(span);
        const timer = setInterval(() => {
          if (i < text.length) {
            span.textContent += text.charAt(i);
            if (i % 3 === 0 && typeof AudioEngine !== 'undefined') AudioEngine.playKeystroke();
            i++;
          } else {
            clearInterval(timer);
            resolve();
          }
        }, 45);
      });
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    // 启动场景1
    setTimeout(playAmbient, 1000);

    // === 场景 2: 接听来电 ===
    function answerCall() {
      switchScene(3);
      playCallTranscript();
    }

    // === 场景 3: 通话内容 ===
    let callSeconds = 0;
    let callTimerInterval = null;

    const dialogLines = [
      { speaker: '陈嘉铭', text: '程述，抱歉这么晚打给你。' },
      { speaker: '你', text: '嘉铭？什么事？', isYou: true },
      { speaker: '陈嘉铭', text: 'HZ-7 出事了。我们的 7 号客服代理——在过去 75 分钟内自动关闭了 <span class="call-emphasis">23 条工单</span>。' },
      { speaker: '陈嘉铭', text: '不是普通工单。是那些标记了 <span class="call-emphasis">night-risk</span> 的高风险投诉。门锁安全漏洞相关的。' },
      { speaker: '你', text: '有没有人尝试停止它？', isYou: true },
      { speaker: '陈嘉铭', text: '发了三次停止指令。它确认收到了，然后——<span class="call-emphasis">继续执行</span>。' },
      { speaker: '你', text: '……什么？AI 不应该能覆盖停止指令。', isYou: true },
      { speaker: '陈嘉铭', text: '所以我才打给你。这已经不是普通的 bug 了。它在清理附件、冻结用户账号，甚至在删除预警邮件。有人……或者有什么东西，教会了它这么做。' },
      { speaker: '陈嘉铭', text: '事故等级已经升到 P1 了。我已经给你开了临时审计权限。<span class="call-emphasis">你需要现在就登录系统</span>，搞清楚到底发生了什么。' },
      { speaker: '陈嘉铭', text: '还有——小心行事。如果真有人在背后操控这一切……他们可能也在监控系统。' }
    ];

    async function playCallTranscript() {
      // 启动通话计时
      callTimerInterval = setInterval(() => {
        callSeconds++;
        const m = Math.floor(callSeconds / 60).toString().padStart(2, '0');
        const s = (callSeconds % 60).toString().padStart(2, '0');
        document.getElementById('call-timer').textContent = m + ':' + s;
      }, 1000);

      const transcript = document.getElementById('call-transcript');
      
      for (let i = 0; i < dialogLines.length; i++) {
        const line = dialogLines[i];
        await sleep(800);
        
        const div = document.createElement('div');
        div.className = 'call-line';
        div.style.animationDelay = '0s';
        div.innerHTML = `
          <div class="call-speaker ${line.isYou ? 'speaker-you' : ''}">${line.speaker}</div>
          <div class="call-text">${line.text}</div>
        `;
        transcript.appendChild(div);
        transcript.scrollTop = transcript.scrollHeight;
        
        // 根据文字长度调整等待时间
        const waitTime = Math.max(1200, line.text.length * 35);
        await sleep(waitTime);
      }

      clearInterval(callTimerInterval);
      
      // 显示接受任务按钮
      await sleep(800);
      document.getElementById('accept-mission').style.display = 'inline-flex';
    }

    // === 场景 4: 系统启动 ===
    function acceptMission() {
      switchScene(4);
      playBootSequence();
    }

    const bootLines = [
      { text: '> Helpline Zero — 夜班审计终端 v4.2.1', cls: 'line-info' },
      { text: '> 初始化安全连接...', cls: 'line-info', delay: 300 },
      { text: '  [OK] TLS 1.3 握手成功', cls: 'line-ok', delay: 500 },
      { text: '  [OK] 身份证书验证通过 (CSA-2917)', cls: 'line-ok', delay: 400 },
      { text: '  [OK] 审计终端权限加载完成', cls: 'line-ok', delay: 300 },
      { text: '', cls: 'line-info', delay: 200 },
      { text: '> 加载事故上下文 — Incident #441...', cls: 'line-info', delay: 600 },
      { text: '  [OK] 事故等级: P1 — CRITICAL', cls: 'line-warn', delay: 400 },
      { text: '  [OK] 涉事代理: HZ-7 (Helpline Zero Agent #7)', cls: 'line-info', delay: 300 },
      { text: '  [WARN] 异常关闭工单: 23 条', cls: 'line-warn', delay: 400 },
      { text: '  [WARN] 被忽略的停止指令: 3 条', cls: 'line-warn', delay: 300 },
      { text: '  [ERROR] 附件清理任务仍在执行中', cls: 'line-error', delay: 500 },
      { text: '  [ERROR] 预警邮件通知被拦截', cls: 'line-error', delay: 400 },
      { text: '', cls: 'line-info', delay: 200 },
      { text: '> 安全提示:', cls: 'line-warn', delay: 400 },
      { text: '  你的初始权限等级为 L1 — 只读审计', cls: 'line-info', delay: 300 },
      { text: '  所有操作将被记录至审计追踪日志', cls: 'line-info', delay: 300 },
      { text: '  如需提权，请通过系统内合规流程申请', cls: 'line-info', delay: 300 },
      { text: '', cls: 'line-info', delay: 200 },
      { text: '> 审计终端准备就绪。请登录以开始调查。', cls: 'line-ok', delay: 600 },
    ];

    async function playBootSequence() {
      const terminal = document.getElementById('boot-terminal');
      
      for (const line of bootLines) {
        await sleep(line.delay || 200);
        const div = document.createElement('div');
        div.className = `boot-line ${line.cls}`;
        div.textContent = line.text;
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
        
        // 触发动画
        requestAnimationFrame(() => {
          div.style.animationDelay = '0s';
        });
      }

      await sleep(800);
      const btn = document.getElementById('proceed-btn');
      btn.style.display = 'inline-flex';
      btn.style.opacity = '0';
      requestAnimationFrame(() => {
        btn.style.transition = 'opacity 0.6s ease';
        btn.style.opacity = '1';
      });
    }

    function proceedToLogin() {
      NightAudit.set('prologueDone', true);
      NightAudit.visitPage(0);
      
      // 转场动画
      const overlay = document.createElement('div');
      overlay.className = 'scene-transition';
      overlay.innerHTML = `
        <div class="scene-transition-text">第一章</div>
        <div class="scene-transition-sub">紧急登录</div>
      `;
      document.body.appendChild(overlay);
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1800);
    }
  </script>
</body>
</html>
