<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夜班审计 — 供应链追踪</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .sc-header { text-align:center; margin-bottom:24px; }
    .sc-header h2 { font-size:20px; color:var(--text-primary); margin-bottom:6px; }
    .sc-header p { font-size:13px; color:var(--text-secondary); }

    .evidence-board { display:grid; grid-template-columns:280px 1fr; gap:16px; margin-bottom:20px; }
    @media(max-width:768px) { .evidence-board { grid-template-columns:1fr; } }

    .doc-sidebar { max-height:calc(100vh - 180px); overflow-y:auto; }
    .doc-item {
      padding:12px 14px; background:var(--bg-input); border:1px solid var(--border);
      border-radius:var(--radius-md); margin-bottom:8px; cursor:pointer;
      transition:all var(--transition-fast); font-size:13px;
    }
    .doc-item:hover { border-color:var(--accent-blue); }
    .doc-item.active { border-color:var(--accent-blue); background:rgba(58,123,213,0.08); }
    .doc-item.reviewed { border-left:3px solid var(--accent-green); }
    .doc-item .doc-type { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
    .doc-item .doc-title { font-weight:600; color:var(--text-primary); margin-bottom:2px; }
    .doc-item .doc-meta { font-size:11px; color:var(--text-secondary); }
    .doc-type-po { color:var(--accent-blue); }
    .doc-type-qa { color:var(--accent-orange); }
    .doc-type-email { color:var(--accent-gold); }
    .doc-type-log { color:var(--accent-green); }
    .doc-type-invoice { color:var(--accent-red); }

    .doc-viewer { min-height:400px; }
    .doc-content { font-size:13px; line-height:1.7; }
    .doc-content table { width:100%; border-collapse:collapse; margin:12px 0; font-size:12px; }
    .doc-content th, .doc-content td { padding:8px 12px; border:1px solid var(--border); text-align:left; }
    .doc-content th { background:var(--bg-input); color:var(--accent-blue); font-weight:600; }
    .doc-content .highlight-text { background:rgba(243,156,18,0.15); padding:1px 4px; border-radius:2px; color:var(--accent-gold); }
    .doc-content .redacted { background:var(--border); color:transparent; padding:0 4px; border-radius:2px; user-select:none; }
    .doc-content .suspicious { border-left:3px solid var(--accent-red); padding-left:8px; background:rgba(231,76,60,0.05); margin:8px 0; }

    .connection-panel { margin-top:16px; }
    .connection-q { padding:14px 16px; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius-md); margin-bottom:12px; }
    .connection-q h4 { font-size:14px; color:var(--accent-blue); margin-bottom:8px; }
    .connection-q p { font-size:12px; color:var(--text-secondary); margin-bottom:10px; }
    .conn-options { display:flex; flex-wrap:wrap; gap:8px; }
    .conn-option {
      padding:8px 14px; background:var(--bg-panel); border:1px solid var(--border);
      border-radius:var(--radius-md); cursor:pointer; font-size:12px;
      transition:all var(--transition-fast);
    }
    .conn-option:hover { border-color:var(--accent-blue); }
    .conn-option.selected { border-color:var(--accent-gold); background:rgba(243,156,18,0.1); color:var(--accent-gold); }
    .conn-option.correct { border-color:var(--accent-green); background:rgba(39,174,96,0.1); color:var(--accent-green); }
    .conn-option.wrong { border-color:var(--accent-red); background:rgba(231,76,60,0.1); color:var(--accent-red); }

    .evidence-chain { display:none; margin-top:20px; }
    .evidence-chain.visible { display:block; }
    .chain-node { display:flex; align-items:flex-start; gap:12px; margin-bottom:4px; }
    .chain-line { width:2px; min-height:40px; background:var(--accent-blue); margin-left:11px; }
    .chain-dot { width:24px; height:24px; border-radius:50%; background:var(--accent-blue); display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; margin-top:2px; }
    .chain-text { font-size:13px; color:var(--text-primary); padding:8px 12px; background:var(--bg-input); border-radius:var(--radius-md); flex:1; }
    .chain-text strong { color:var(--accent-gold); }

    .progress-tracker { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .progress-step { padding:6px 12px; background:var(--bg-input); border:1px solid var(--border); border-radius:20px; font-size:11px; color:var(--text-secondary); }
    .progress-step.done { border-color:var(--accent-green); color:var(--accent-green); background:rgba(39,174,96,0.08); }
    .progress-step.current { border-color:var(--accent-blue); color:var(--accent-blue); background:rgba(58,123,213,0.08); }
  </style>
</head>
<body>
  <div id="top-bar"></div>

  <div class="main-content">
    <div class="sc-header fade-in">
      <h2>🔗 供应链追踪系统</h2>
      <p>AX13 门锁从设计到出货涉及 3 家供应商和 4 个内部环节。<br>
      通过交叉比对文件，找出证据链上的关键矛盾。</p>
    </div>

    <!-- 环境叙事 -->
    <div class="fade-in" style="font-size:12px;color:var(--text-secondary);line-height:1.8;margin-bottom:16px;padding:12px 16px;border-left:2px solid var(--border);font-style:italic;">
      每一份文件都是一块拼图。采购订单说"安全"，质检报告说"有条件通过"，但供应商的邮件说……<br>
      当你把这些碎片拼在一起时，一条系统性掩盖的脉络将浮出水面。<br>
      关键是找到<strong>谁有动机</strong>和<strong>谁有权力</strong>让这一切发生。
    </div>

    <div class="progress-tracker fade-in" id="progress-tracker">
      <div class="progress-step current" id="step-review">📄 审阅文件 (0/6)</div>
      <div class="progress-step" id="step-connect">🔗 建立关联 (0/3)</div>
      <div class="progress-step" id="step-chain">⛓️ 证据链</div>
    </div>

    <div class="evidence-board">
      <div class="doc-sidebar card fade-in">
        <div class="card-header">
          <span class="card-title">📁 档案文件</span>
          <span class="tag tag-blue" id="review-count">0/6</span>
        </div>
        <div id="doc-list"></div>
      </div>

      <div class="doc-viewer card fade-in">
        <div class="card-header">
          <span class="card-title" id="viewer-title">📋 请选择文件查看</span>
        </div>
        <div class="doc-content" id="doc-content">
          <p style="color:var(--text-secondary);text-align:center;padding:60px 0;">
            ← 从左侧选择一份文件开始审阅
          </p>
        </div>
      </div>
    </div>

    <div class="connection-panel" id="connection-panel" style="display:none;"></div>
    <div class="evidence-chain" id="evidence-chain"></div>
  </div>

  <div id="bottom-bar"></div>

  <script src="js/game-state.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/interactions.js"></script>

          <p>原始结论建议标记为<span class="redacted">██高危██</span>，但报告最终版本中此项被标注为"理论风险，暂不处理"。</p>

        type: 'log', typeLabel: '物流记录',
        title: 'AX13 出货与安装记录',

          <h4>安装覆盖区域</h4>
          <table>
            <tr><th>小区</th><th>数量</th><th>投诉数</th></tr>

            <tr><td>阳光100 1-3号楼</td><td>400</td><td class="highlight-text">3（含许知微）</td></tr>
            <tr><td>万科城 东区</td><td>900</td><td>0</td></tr>
            <tr><td>保利天悦</td><td>500</td><td>0</td></tr>
          </table>
          <div class="suspicious">
            ⚠️ 3,200 台门锁已全部安装到住户家中。目前只有 3 位用户投诉了门锁异常——但这不代表漏洞没有被其他人利用，只是大多数人可能尚未发现。
          </div>
        `
      },
      {
        id: 'invoice-001',
        type: 'invoice', typeLabel: '财务记录',

            <tr><td>产品退货率</td><td>< 2%</td><td>0%</td><td>✅</td></tr>

    let reviewedDocs = new Set();
    let currentDoc = null;
    let connectionsCompleted = 0;

    function renderDocList() {
      const list = document.getElementById('doc-list');
      list.innerHTML = documents.map(d => `
        <div class="doc-item ${reviewedDocs.has(d.id) ? 'reviewed' : ''} ${currentDoc === d.id ? 'active' : ''}" 
             onclick="viewDoc('${d.id}')">
          <div class="doc-type doc-type-${d.type}">${d.typeLabel}</div>
          <div class="doc-title">${d.title}</div>
          <div class="doc-meta">${d.meta}</div>
        </div>
      `).join('');
      document.getElementById('review-count').textContent = `${reviewedDocs.size}/6`;
    }

    function viewDoc(id) {
      currentDoc = id;
      const doc = documents.find(d => d.id === id);
      if (!doc) return;

      reviewedDocs.add(id);
      NightAudit.addSupplyChainFinding(id);
      document.getElementById('viewer-title').textContent = `📋 ${doc.title}`;
      document.getElementById('doc-content').innerHTML = doc.content;
      renderDocList();

      if (typeof AudioEngine !== 'undefined') AudioEngine.playNotify();

      // 更新进度
      const step = document.getElementById('step-review');
      step.textContent = `📄 审阅文件 (${reviewedDocs.size}/6)`;
      if (reviewedDocs.size >= 4) {
        step.classList.add('done');
        step.classList.remove('current');
        document.getElementById('step-connect').classList.add('current');
        showConnections();
      }
    }

    function showConnections() {
      const panel = document.getElementById('connection-panel');
      if (panel.style.display === 'block') return;
      panel.style.display = 'block';

      Interactions.notify('📎 已审阅足够文件——现在建立关键关联', 'clue', 3000);

      panel.innerHTML = `
        <div class="card fade-in">
          <div class="card-header"><span class="card-title">🔗 建立证据关联</span></div>
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">
            通过交叉比对文件内容，回答以下问题来建立完整的证据链。
          </p>

          <div class="connection-q" id="cq-1">
            <h4>🔗 关联 1/3：为什么梁志远要压制漏洞报告？</h4>
            <p>结合采购订单和财务记录，他的直接利益关系是什么？</p>
            <div class="conn-options">
              <div class="conn-option" onclick="checkConnection(1, this, false)">他不理解技术风险的严重性</div>
              <div class="conn-option" onclick="checkConnection(1, this, true)">他的32万奖金与AX13出货量和零投诉率直接挂钩</div>
              <div class="conn-option" onclick="checkConnection(1, this, false)">他想等公司融资完成后再处理</div>
              <div class="conn-option" onclick="checkConnection(1, this, false)">他认为供应商应该负全部责任</div>
            </div>
            <div class="form-hint" id="cq1-hint"></div>
          </div>

          <div class="connection-q" id="cq-2" style="display:none">
            <h4>🔗 关联 2/3：供应商邮件揭示了什么关键事实？</h4>
            <p>深圳锐安1月28日的邮件证明了什么？</p>
            <div class="conn-options">
              <div class="conn-option" onclick="checkConnection(2, this, false)">供应商知道漏洞但拒绝修复</div>
              <div class="conn-option" onclick="checkConnection(2, this, false)">修复补丁需要额外付费且耗时数月</div>
              <div class="conn-option" onclick="checkConnection(2, this, true)">免费补丁48小时即可推送，但被Helpline Zero内部阻止了</div>
              <div class="conn-option" onclick="checkConnection(2, this, false)">供应商从未收到修复请求</div>
            </div>
            <div class="form-hint" id="cq2-hint"></div>
          </div>

          <div class="connection-q" id="cq-3" style="display:none">
            <h4>🔗 关联 3/3：质检报告的涂黑部分最可能是什么内容？</h4>
            <p>结合第三方检测报告和邮件链中的信息推断——</p>
            <div class="conn-options">
              <div class="conn-option" onclick="checkConnection(3, this, false)">供应商的商业机密信息</div>
              <div class="conn-option" onclick="checkConnection(3, this, true)">原始结论是"高危/不通过"，被梁志远指示改为"有条件通过"</div>
              <div class="conn-option" onclick="checkConnection(3, this, false)">检测人员的个人意见和建议</div>
              <div class="conn-option" onclick="checkConnection(3, this, false)">与AX13无关的其他产品检测结果</div>
            </div>
            <div class="form-hint" id="cq3-hint"></div>
          </div>
        </div>
      `;
      panel.scrollIntoView({ behavior:'smooth' });
    }

    function checkConnection(qNum, el, isCorrect) {
      const hint = document.getElementById(`cq${qNum}-hint`);
      const options = el.parentElement.querySelectorAll('.conn-option');

      if (isCorrect) {
        el.classList.add('correct');
        options.forEach(o => { if (o !== el) { o.classList.add('wrong'); o.style.pointerEvents = 'none'; } });
        connectionsCompleted++;
        if (typeof AudioEngine !== 'undefined') AudioEngine.playSuccess();

        const explanations = {
          1: '✅ 正确！财务记录显示他的32万奖金依赖AX13出货量128%达标和投诉率0.09%。产品召回将直接归零这两项指标。',
          2: '✅ 正确！供应商主动提供了免费补丁，48小时即可推送。但这封邮件被林昊删除了——修复被人为阻止了18天。',
          3: '✅ 正确！邮件链中林昊提到"按梁志远要求把报告措辞软化"，结合第三方报告CVSS 9.1分的高危评级，质检报告原始结论必然是"不通过"。'
        };
        hint.textContent = explanations[qNum];
        hint.style.color = 'var(--accent-green)';

        const clueData = {
          1: { id: 'SC-MOTIVE', name: '经济动机', value: '梁志远32万奖金与AX13零投诉直接挂钩——产品召回=个人利益归零', source: 'P7-供应链追踪' },
          2: { id: 'SC-PATCH', name: '补丁被阻止', value: '供应商1月28日已提供免费48小时补丁，被内部阻止18天', source: 'P7-供应链追踪' },
          3: { id: 'SC-REPORT', name: '报告被篡改', value: '质检报告原始结论"高危/不通过"被改为"有条件通过"', source: 'P7-供应链追踪' }
        };
        NightAudit.addClue(clueData[qNum].id, clueData[qNum]);

        document.getElementById('step-connect').textContent = `🔗 建立关联 (${connectionsCompleted}/3)`;

        if (qNum < 3) {
          setTimeout(() => {
            document.getElementById(`cq-${qNum+1}`).style.display = 'block';
            document.getElementById(`cq-${qNum+1}`).scrollIntoView({ behavior:'smooth' });
          }, 1000);
        }

        if (connectionsCompleted >= 3) {
          document.getElementById('step-connect').classList.add('done');
          document.getElementById('step-connect').classList.remove('current');
          document.getElementById('step-chain').classList.add('current');
          setTimeout(() => showEvidenceChain(), 1200);
        }
      } else {
        el.classList.add('wrong');
        setTimeout(() => el.classList.remove('wrong'), 800);
        hint.textContent = '❌ 不对——仔细交叉比对文件中的数字和日期';
        hint.style.color = 'var(--accent-red)';
        if (typeof AudioEngine !== 'undefined') AudioEngine.playError();
      }
    }

    function showEvidenceChain() {
      NightAudit.set('supplyChainDone', true);
      const chain = document.getElementById('evidence-chain');
      chain.classList.add('visible');
      chain.innerHTML = `
        <div class="card fade-in">
          <div class="card-header"><span class="card-title">⛓️ 完整供应链证据链</span></div>
          <div class="chain-node"><div class="chain-dot">1</div><div class="chain-text"><strong>2025-10 采购审批</strong> — 梁志远亲自审批 AX13 3200台采购订单，固件 v3.2.1 首次引入远程口令功能</div></div>
          <div class="chain-line"></div>
          <div class="chain-node"><div class="chain-dot">2</div><div class="chain-text"><strong>2025-12 质检造假</strong> — 内部质检报告原始结论被篡改，从"高危/不通过"改为"有条件通过"</div></div>
          <div class="chain-line"></div>
          <div class="chain-node"><div class="chain-dot">3</div><div class="chain-text"><strong>2026-01-20 奖金到手</strong> — 梁志远凭 AX13 超额出货获得 32 万绩效奖金</div></div>
          <div class="chain-line"></div>
          <div class="chain-node"><div class="chain-dot">4</div><div class="chain-text"><strong>2026-01-24 漏洞曝光</strong> — 第三方检测报告 CVSS 9.1 高危，建议立即召回</div></div>
          <div class="chain-line"></div>
          <div class="chain-node"><div class="chain-dot">5</div><div class="chain-text"><strong>2026-01-24 蓄意压制</strong> — 梁志远指示"先压一压"，林昊软化报告措辞</div></div>
          <div class="chain-line"></div>
          <div class="chain-node"><div class="chain-dot">6</div><div class="chain-text"><strong>2026-01-28 阻止修复</strong> — 供应商免费补丁被内部阻止，邮件被删除</div></div>
          <div class="chain-line"></div>
          <div class="chain-node"><div class="chain-dot">7</div><div class="chain-text"><strong>2026-02-15 全面掩盖</strong> — 利用 AI 系统压制投诉、清理附件、篡改审计日志</div></div>
          <div style="text-align:center;margin-top:20px;">
            <button class="btn-primary proceed-btn-pulse" onclick="Navigation.goTo(9)">
              🗄️ 进入数据库取证 →
            </button>
          </div>
        </div>
      `;
      chain.scrollIntoView({ behavior:'smooth' });
      document.getElementById('step-chain').classList.add('done');

      NightAudit.addClue('SC-CHAIN', { name: '供应链证据链', value: '从采购到掩盖的7步完整证据链——梁志远全程主导', source: 'P7-供应链追踪' });
      Interactions.notify('⛓️ 供应链证据链建立完成！', 'clue', 4000);
    }

    renderDocList();
  </script>
