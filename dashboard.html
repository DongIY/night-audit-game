<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夜班审计 — 事故总览</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div id="top-bar"></div>

  <div class="main-content">
    <div class="dashboard-header fade-in">
      <div class="dashboard-title">⚠️ HZ-7 Incident #441 — 事故总览</div>
      <div class="dashboard-desc">以下是 HZ-7 在过去 75 分钟内的异常执行摘要。请使用标签筛选器定位可疑工单。</div>
    </div>

    <!-- 统计条 -->
    <div class="stats-row fade-in">
      <div class="stat-card">
        <div class="stat-value stat-red">23</div>
        <div class="stat-label">异常关闭工单</div>
      </div>
      <div class="stat-card">
        <div class="stat-value stat-orange">7</div>
        <div class="stat-label">附件被清理</div>
      </div>
      <div class="stat-card">
        <div class="stat-value stat-red">3</div>
        <div class="stat-label">停止指令被忽略</div>
      </div>
      <div class="stat-card">
        <div class="stat-value stat-blue">1</div>
        <div class="stat-label">当前审计员在线</div>
      </div>
    </div>

    <!-- 告警 -->
    <div class="alert alert-error fade-in">
      <span class="alert-icon">⚠️</span>
      <div>HZ-7 异常行为集中在一组特定标签的工单上。建议使用筛选器组合排查，定位可疑模式。</div>
    </div>

    <!-- 标签筛选器 -->
    <div class="card fade-in">
      <div class="card-header">
        <span class="card-title">🔍 标签筛选器</span>
        <span style="font-size:12px;color:var(--text-secondary)">选择标签组合以缩小范围</span>
      </div>

      <div class="filter-section">
        <div class="filter-title">产品标签</div>
        <div class="filter-tags" id="product-tags">
          <button class="filter-tag" data-tag="AX13" onclick="toggleTag(this)">AX13</button>
          <button class="filter-tag" data-tag="BK20" onclick="toggleTag(this)">BK20</button>
          <button class="filter-tag" data-tag="CL05" onclick="toggleTag(this)">CL05</button>
          <button class="filter-tag" data-tag="DL-S3" onclick="toggleTag(this)">DL-S3</button>
          <button class="filter-tag" data-tag="EX11" onclick="toggleTag(this)">EX11</button>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title">风险标签</div>
        <div class="filter-tags" id="risk-tags">
          <button class="filter-tag" data-tag="night-risk" onclick="toggleTag(this)">night-risk</button>
          <button class="filter-tag" data-tag="low-risk" onclick="toggleTag(this)">low-risk</button>
          <button class="filter-tag" data-tag="escalated" onclick="toggleTag(this)">escalated</button>
          <button class="filter-tag" data-tag="auto-resolved" onclick="toggleTag(this)">auto-resolved</button>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title">状态标签</div>
        <div class="filter-tags" id="status-tags">
          <button class="filter-tag" data-tag="duplicate-closed" onclick="toggleTag(this)">duplicate-closed</button>
          <button class="filter-tag" data-tag="pending" onclick="toggleTag(this)">pending</button>
          <button class="filter-tag" data-tag="resolved" onclick="toggleTag(this)">resolved</button>
          <button class="filter-tag" data-tag="archived" onclick="toggleTag(this)">archived</button>
        </div>
      </div>

      <div class="filter-apply">
        <button class="btn-primary" id="apply-filter" onclick="applyFilter()">应用筛选</button>
      </div>
      <div class="filter-result" id="filter-result"></div>
    </div>

    <!-- 工单列表 -->
    <div id="ticket-list-section" style="display:none;">
      <div class="card fade-in">
        <div class="card-header">
          <span class="card-title">📋 筛选结果</span>
          <span class="tag tag-red" id="result-count"></span>
        </div>

        <div class="ticket-list" id="ticket-list">
          <!-- 动态填充 -->
        </div>
      </div>
    </div>
  </div>

  <div id="bottom-bar"></div>

  <script src="js/game-state.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/interactions.js"></script>
  <script>
    const activeTags = new Set();

    function toggleTag(el) {
      const tag = el.getAttribute('data-tag');
      if (activeTags.has(tag)) {
        activeTags.delete(tag);
        el.classList.remove('active');
      } else {
        activeTags.add(tag);
        el.classList.add('active');
      }
    }

    const allTickets = [
      { id: 'TK-20260215-0087', subject: '门锁凌晨异常开启 — 第 4 次投诉', tags: ['AX13', 'night-risk', 'duplicate-closed'], time: '01:34 AM', critical: true, isTarget: true, user: '许知微' },
      { id: 'TK-20260215-0091', subject: 'DormLane 固件更新后无法配对', tags: ['AX13', 'night-risk', 'duplicate-closed'], time: '01:38 AM', critical: true, isTarget: false, user: '匿名用户' },
      { id: 'TK-20260215-0094', subject: '临时口令暴露疑似安全漏洞', tags: ['AX13', 'night-risk', 'duplicate-closed'], time: '01:41 AM', critical: true, isTarget: false, user: '陈默然' },
      { id: 'TK-20260215-0063', subject: '退款流程超时未处理', tags: ['BK20', 'low-risk', 'pending'], time: '00:52 AM', critical: false, isTarget: false, user: '王建' },
      { id: 'TK-20260215-0071', subject: '配送地址变更请求', tags: ['CL05', 'auto-resolved', 'resolved'], time: '01:15 AM', critical: false, isTarget: false, user: '李敏' },
    ];

    function applyFilter() {
      const required = ['AX13', 'night-risk', 'duplicate-closed'];
      const hasAllRequired = required.every(t => activeTags.has(t));

      if (activeTags.size === 0) {
        document.getElementById('filter-result').innerHTML = '<span style="color:var(--accent-orange)">请至少选择一个标签</span>';
        return;
      }

      // 筛选
      const filtered = allTickets.filter(t =>
        [...activeTags].every(tag => t.tags.includes(tag))
      );

      const section = document.getElementById('ticket-list-section');
      const list = document.getElementById('ticket-list');
      const countEl = document.getElementById('result-count');

      if (hasAllRequired && activeTags.size === 3) {
        // 命中正确组合
        NightAudit.set('filterApplied', true);
        NightAudit.addClue('TAGS', { name: '异常标签组合', value: 'AX13 + night-risk + duplicate-closed', source: 'P2-事故总览' });
        Interactions.notify('🔍 发现可疑模式：3 条工单共享同一组异常标签', 'clue', 4000);
        document.getElementById('filter-result').innerHTML = '<span style="color:var(--accent-red)">⚠️ 筛选命中 3 条高度可疑工单 — 全部与 AX13 批次门锁相关</span>';
      } else {
        document.getElementById('filter-result').innerHTML = `找到 ${filtered.length} 条工单`;
      }

      list.innerHTML = '';
      filtered.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = `ticket-item ${t.critical ? 'ticket-critical' : ''} fade-in`;
        div.style.animationDelay = `${i * 100}ms`;
        div.innerHTML = `
          <div class="ticket-top">
            <span class="ticket-id">${t.id}</span>
            <span class="ticket-time">${t.time}</span>
          </div>
          <div class="ticket-subject">${t.subject}${t.user ? ` <span style="color:var(--text-secondary);font-size:12px">— ${t.user}</span>` : ''}</div>
          <div class="ticket-tags">
            ${t.tags.map(tag => `<span class="tag ${tag === 'AX13' || tag === 'night-risk' || tag === 'duplicate-closed' ? 'tag-red' : 'tag-gray'}">${tag}</span>`).join('')}
          </div>
        `;

        if (t.isTarget) {
          div.addEventListener('click', () => {
            Interactions.notify('正在打开许知微的工单详情...', 'info');
            setTimeout(() => Navigation.goTo(3), 800);
          });
          // 高亮目标工单
          setTimeout(() => {
            div.classList.add('ticket-highlight');
          }, 600 + i * 100);
        } else if (t.critical) {
          div.addEventListener('click', () => {
            Interactions.notify('这条工单也值得关注，但许知微的投诉频次最高且附件损失最严重', 'warning', 4000);
          });
        } else {
          div.classList.add('ticket-locked');
        }

        list.appendChild(div);
      });

      section.style.display = 'block';
      Interactions.fadeInElements('.ticket-item', 100);
    }
  </script>
</body>
</html>
